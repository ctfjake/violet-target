{% extends "base.html" %}
{% block title %}Login — Chirpy{% endblock %}
{% block content %}
<div class="auth-box">
  <h1>Welcome back</h1>
  <p class="subtitle">Log in to your Chirpy account.</p>

  {% if error %}
    <div class="alert error">{{ error }}</div>
  {% endif %}

  <form method="post" action="{{ url_for('login') }}">
    <label>Username
      <input type="text" name="username" autofocus required />
    </label>
    <label>Password
      <input type="password" name="password" required />
    </label>
    <button class="btn full" type="submit">Log In</button>
  </form>

  <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
</div>
{% endblock %}
